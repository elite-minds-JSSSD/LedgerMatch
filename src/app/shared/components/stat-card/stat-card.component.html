<div class="stat-card">

    <div class="card-icon" [style.background]="color">
        <i class="{{icon}}"></i>
    </div>

    <div class="card-content">

        <h6>{{title}}</h6>

        <h2>{{value}}</h2>

        <span class="increase">
            <i class="bi bi-arrow-up"></i>
            {{change}}
        </span>

    </div>

</div>
