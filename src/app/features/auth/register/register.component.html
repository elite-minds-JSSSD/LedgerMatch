<div class="register-page">

    <div class="register-container">

        <!-- Left Panel -->
        <div class="left-panel">

            <h1>LedgerMatch</h1>

            <p>
                Create your account to access the Automated Multi-Entity
                Reconciliation Platform.
            </p>

            <div class="illustration">

                <i class="bi bi-shield-check"></i>

            </div>

        </div>

        <!-- Right Panel -->

        <div class="right-panel">

            <h2>Create Account</h2>

            <p class="subtitle">
                Register to continue
            </p>

            <form [formGroup]="registerForm" (ngSubmit)="register()">

                <div class="form-group">

                    <label>Full Name</label>

                  <input
    type="text"
    class="form-control"
    formControlName="fullName"
    placeholder="Enter your full name">

                </div>

                <div class="form-group">

                    <label>Email Address</label>

                    <input
    type="email"
    class="form-control"
    formControlName="email"
    placeholder="Enter your email">

                </div>

                <div class="form-group">

                    <label>Company Name</label>

                   <input
    type="text"
    class="form-control"
    formControlName="company"
    placeholder="Enter company name">

                </div>

                <div class="form-group">

                    <label>Password</label>

                  <div class="password-wrapper">

    <input
        [type]="showPassword ? 'text' : 'password'"
        class="form-control"
        formControlName="password"
        placeholder="Create password">

    <i
        class="bi"
        [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"
        (click)="togglePassword()">
    </i>

</div>
<div
    class="text-danger mt-2"
    *ngIf="registerForm.value.confirmPassword &&
           registerForm.value.password !== registerForm.value.confirmPassword">

    Passwords do not match

</div>
                </div>

                <div class="form-group">

                    <label>Confirm Password</label>

                    <div class="password-wrapper">

    <input
        [type]="showConfirmPassword ? 'text' : 'password'"
        class="form-control"
        formControlName="confirmPassword"
        placeholder="Confirm password">

    <i
        class="bi"
        [ngClass]="showConfirmPassword ? 'bi-eye-slash' : 'bi-eye'"
        (click)="toggleConfirmPassword()">
    </i>

</div>

                </div>

                <button
                    class="btn register-btn w-100"
                    type="submit">

                    Create Account

                </button>

            </form>

            <div class="login-link">

                Already have an account?

                <a routerLink="/login">
                    Login
                </a>

            </div>

        </div>

    </div>

</div>
