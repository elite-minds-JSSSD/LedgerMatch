<div class="container-fluid login-page">

  <div class="row vh-100">

    <!-- Left Panel -->
    <div class="col-lg-6 d-flex flex-column justify-content-center align-items-center left-panel">

      <h1 class="display-4 fw-bold">
        LedgerMatch
      </h1>

      <p class="lead text-center mt-3">
        Automated Multi-Entity Reconciliation Platform
      </p>

      <hr class="w-50">

      <ul class="list-unstyled mt-4">

        <li>✔ AI-Based Reconciliation</li>

        <li class="mt-3">✔ Corporate Accounting Dashboard</li>

        <li class="mt-3">✔ Audit Reports</li>

        <li class="mt-3">✔ Secure Financial Data</li>

      </ul>

    </div>

    <!-- Right Panel -->

    <div class="col-lg-6 d-flex justify-content-center align-items-center">

      <div class="card shadow-lg p-5 login-card">

    <form [formGroup]="loginForm" (ngSubmit)="login()">

        <h2 class="text-center mb-4">
            Welcome Back
        </h2>

        <!-- Email -->

        <div class="mb-3">

            <label>Email</label>

            <input
                type="email"
                class="form-control"
                formControlName="email"
                placeholder="Enter Email">

        </div>

        <!-- Password -->

        <div class="mb-3">

            <label>Password</label>

            <div class="input-group">

                <input
                    [type]="showPassword ? 'text' : 'password'"
                    class="form-control"
                    formControlName="password"
                    placeholder="Enter Password">

                <button
                    type="button"
                    class="btn btn-outline-secondary"
                    (click)="togglePassword()">

                    <i
                        class="bi"
                        [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'">
                    </i>

                </button>

            </div>

        </div>

        <!-- Remember -->

        <div class="form-check mb-3">

            <input
                class="form-check-input"
                type="checkbox">

            <label class="form-check-label">

                Remember Me

            </label>

        </div>

        <!-- Button -->

        <button
            type="submit"
            class="btn btn-primary w-100">

            Login

        </button>

    </form>

</div>

  </div>

</div>
